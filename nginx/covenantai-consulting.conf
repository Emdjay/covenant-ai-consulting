# Caddy reverse proxy configuration for covenantai.consulting
# The marketing VPS (187.77.16.57) uses Caddy as its reverse proxy.
#
# Add this block to the Caddyfile on the VPS:
#
# covenantai.consulting {
#     reverse_proxy localhost:3200
# }
#
# Caddy handles SSL/TLS automatically via Let's Encrypt.
# No manual certificate management needed.
