name: Deploy to Hostinger VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy Consulting Site
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via Hostinger Docker API
        run: |
          MAX_RETRIES=3
          RETRY_DELAY=15

          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "Consulting site deployment attempt $attempt/$MAX_RETRIES..."
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              -H "Authorization: Bearer ${{ secrets.HOSTINGER_API_KEY }}" \
              -H "Content-Type: application/json" \
              "https://developers.hostinger.com/api/vps/v1/virtual-machines/${{ vars.HOSTINGER_VM_ID }}/docker/consulting-site/update")
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -n -1)
            echo "Status: $HTTP_CODE"
            echo "Response: $BODY"

            if [ "$HTTP_CODE" -lt 400 ]; then
              echo "Consulting site deployment succeeded"
              exit 0
            fi

            if [ "$HTTP_CODE" -eq 503 ] || [ "$HTTP_CODE" -eq 502 ] || [ "$HTTP_CODE" -eq 429 ]; then
              if [ "$attempt" -lt "$MAX_RETRIES" ]; then
                echo "Hostinger API returned $HTTP_CODE, retrying in ${RETRY_DELAY}s..."
                sleep $RETRY_DELAY
                RETRY_DELAY=$((RETRY_DELAY * 2))
                continue
              fi
            fi

            echo "::error::Deployment failed with HTTP $HTTP_CODE after $attempt attempt(s)"
            exit 1
          done
